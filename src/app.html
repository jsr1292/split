<!doctype html>
<html lang="es">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Splitrr" />
		<link rel="manifest" href="/manifest.json" />
		<link rel="icon" href="/icon-192.png" type="image/png" />
		<link rel="apple-touch-icon" href="/icon-512.png" />
		<meta name="theme-color" content="#07090f" />
		<link rel="preload" href="/manifest.json" as="fetch" crossorigin />
		<script>
			(function() {
				var t = localStorage.getItem('split-theme') || 'dark';
				document.documentElement.setAttribute('data-theme', t);
				var colors = { dark: '#07090f', oled: '#000000', light: '#f5f3ee' };
				document.querySelector('meta[name="theme-color"]').content = colors[t] || colors.dark;
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="splash" style="position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.5s;">
			<div style="color:#72D2A2;font-size:32px;font-weight:700;font-family:Georgia,serif;">Splitrr</div>
		</div>
		<script>setTimeout(()=>{const s=document.getElementById('splash');if(s){s.style.opacity='0';setTimeout(()=>s.remove(),500);}},800);</script>
		<div id="svelte">%sveltekit.body%</div>
	</body>
</html>
